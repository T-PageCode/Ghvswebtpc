<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ghvswebtpc</title>
    <link rel="icon" href="../SystemLogo.png">
    <style>
        body{
            background-color: white;
            -moz-user-select: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #div_id1{
            position: fixed;
            top: 0%;
            left: 50%;
            transform: translateX(-50%);
            background-color:rgb(243, 224, 255);
            border-radius: 10px;
            width: 100%;
            height: 40px;
        }
        #div_id2{
            position: fixed;
            top: 50%;
            left: 10%;
            transform: translate(-50%,-50%);
            width: 15%;
            height: 75%;
            background-color: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #div_id3{
            position: fixed;
            top: 13%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 40px;
            background-color: rgb(255, 255, 255);
        }
        #image1{
            position: fixed;
            top: 50%;
            left: 97%;
            transform: translate(-50%,-50%);
            height: 100%;
        }
        #input1{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 40%;
            height: 25px;
            border: 2px solid rgb(212, 142, 255);
            border-radius: 10px;
            background-color: rgb(228, 199, 255);
            color: white;
            font-size: 20px;
        }
        #input1:focus{
            outline: none;
            border-color: rgb(140, 0, 255);
        }
        #btn1{
            position: fixed;
            top: 50%;
            left: 77%;
            transform: translate(-50%,-50%);
            width: 10%;
            height: 30px;
            background-color:rgb(221, 180, 255);
            border: none;
            border-radius: 10px;
            color: white;
            transition: background-color 0.5s ease;
        }
        #btn1:hover{
            background-color: rgb(189, 108, 255);
        }
        #text1{
            position: fixed;
            top: 0%;
            left: 28%;
            transform: translate(-50%,-50%);
            font-size: 20px;
            visibility: hidden;
        }
        #iframe1{
            position: fixed;
            top: 63%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 99vw;
            height: 70%;
            border: 1px solid rgb(200, 133, 255);
            border-radius: 10px;
        }
    </style>
    <script>
        document.addEventListener("contextmenu",function(NoCtm){
            NoCtm.preventDefault()
        })
    </script>
</head>
<body>
    <div id="div_id1">
        <img src="../BrowserImage.png" id="image1">
        <div id="div_id2">
            <p id="PageTitleText">新标签页</p>
        </div>
    </div>
    <div id="div_id3">
        <input id="input1">
        <button id="btn1" onclick="SrcFW()">前往</button>
        <p id="text1">i</p>
    </div>
    <iframe id="iframe1" src="./TabPage.html"></iframe>
    <script>
        function SrcFW() {
            let input1 = document.getElementById("input1");
            let PageTitleText = document.getElementById("PageTitleText");
            let ipt1i = input1.value.trim();
            ipt1i = ipt1i.replaceAll("。", ".");
            if (ipt1i === "ghtpcbr://newtabpage") {
                iframe1.src = "./TabPage.html";
            }
            else if (ipt1i === "ghtpcbr://newtabpage_black") {
                iframe1.src = "./TabPage_Black.html";
            }
            else {
                iframe1.src = ipt1i;
            }
            iframe1.onload = function () {
                try {
                    const PageTitle = iframe1.contentDocument.title;
                    PageTitleText.innerText = PageTitle;
                }
                catch (err) {
                    PageTitleText.innerText = "标题无法获取";
                }
            }
        }
    document.addEventListener("keydown",(key) => {
        if (key.key === "Enter") {
            SrcFW();
        }
    })
    </script>
</body>
</html>
