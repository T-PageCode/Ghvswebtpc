<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ghvswebtpc</title>
    <link rel="icon" href="../SystemLogo.png">
    <style>
        body{
            background-color: rgb(255, 255, 255);
            -moz-user-select: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #textarea1{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 100vw;
            height: 100vh;
            font-size: 25px;
            font-family: Consolas, monospace;
            resize: none;
            text-shadow:0 0 15px rgb(0, 0, 0),
            0 0 25px rgb(0, 0, 0);
            color: rgb(0, 0, 0);
            background-color: rgb(255, 255, 255);
            outline: none;
            border: none;
        }
        #btn1{
            position: fixed;
            top: 80%;
            left: 60%;
            transform: translate(-50%,-50%);
            background-color: rgb(0, 0, 0);
            border: none;
            border-radius: 10px;
            color: rgb(255, 255, 255);
            width: 15%;
            height: 5%;
            transition: background-color 0.5s ease,
            color 0.5s ease;
        }
        #btn1:hover{
            background-color: rgb(56,56,56);
            color: white;
        }
        #btn2{
            position: fixed;
            top: 80%;
            left: 40%;
            transform: translate(-50%,-50%);
            background-color: rgb(0, 0, 0);
            border: none;
            border-radius: 10px;
            color: rgb(255, 255, 255);
            width: 15%;
            height: 5%;
            transition: background-color 0.5s ease,
            color 0.5s ease;
        }
        #btn2:hover{
            background-color: rgb(56,56,56);
            color: white;
        }
    </style>
    <script>
        document.addEventListener("contextmenu",function(NoCtm){
            NoCtm.preventDefault()
        })
    </script>
</head>
<body>
    <textarea id="textarea1"></textarea>
    <button id="btn1" onclick="window.location.href='./TextEditor_Code.html'">黑色主题</button>
    <button id="btn2" onclick="window.location.href='./TextEditor.html'">普通主题</button>
    <script>
        let textarea1 = document.getElementById("textarea1");
        textarea1.value = localStorage.getItem("TextEditorCodeBlackData") || "";
        textarea1.addEventListener("input",() => {
            localStorage.setItem("TextEditorCodeBlackData",textarea1.value);
        })
    </script>
</body>
</html>
