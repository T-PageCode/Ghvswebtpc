<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ghvswebtpc</title>
    <link rel="icon" href="../SystemLogo.png">
    <style>
        body{
            background-color: rgb(0, 0, 0);
            -moz-user-select: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #textarea1{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 100vw;
            height: 100vh;
            font-size: 25px;
            font-family: Consolas, monospace;
            resize: none;
            color: rgb(255,255,255);
            background-color: rgb(0, 0, 0);
            outline: none;
            border: none;
        }
        #text1{
            position: fixed;
            top: 80%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: white;
            font-size: 20px;
            font-weight: 200;
            width: 50%;
            height: 30%;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(0,0,0);
        }
    </style>
    <script>
        document.addEventListener("contextmenu",function(NoCtm){
            NoCtm.preventDefault()
        })
    </script>
</head>
<body>
    <textarea id="textarea1"></textarea>
    <p id="text1">Ghvswebtpc Terminal 终端<br>
    版本 Version:1.0.0，点击任意处开始编辑</p>
    <script>
        let body = document.body;
        let textarea1 = document.getElementById("textarea1");
        textarea1.value = localStorage.getItem("TerminalData") || "";
        document.addEventListener("keydown",(keyd) => {
            if (keyd.key == "Enter") {
                if (textarea1.value === "terminal color:white") {
                    keyd.preventDefault();
                    body.style.backgroundColor = "white";
                    textarea1.style.backgroundColor = "white";
                    textarea1.style.color = "black";
                    textarea1.value = "";
                }
                if (textarea1.value === "terminal color:black") {
                    keyd.preventDefault();
                    body.style.backgroundColor = "black";
                    textarea1.style.backgroundColor = "black";
                    textarea1.style.color = "white";
                    textarea1.value = "";
                }
                if (textarea1.value === "clear terminal") {
                    keyd.preventDefault();
                    textarea1.value = "";
                }
                if (textarea1.value === "hello ghvswebtpc") {
                    textarea1.value = `${textarea1.value}\nHello!欢迎来到Ghvswebtpc，这是一个开源的网页版系统项目!\n开源地址:github.com/T-PageCode/Ghvswebtpc`;
                    setTimeout(() => {
                        textarea1.value = "";
                    },5000)
                }
                if (textarea1.value === "help") {
                    textarea1.value = `${textarea1.value}
                    \n帮助\n
                    terminal color:white = 切换白色主题\n
                    terminal color:black = 切换黑色主题\n
                    clear terminal = 清除输出区\n
                    hello ghvswebtpc = 介绍Ghvswebtpc，带互动❤\n
                    help = 帮助`
                    setTimeout(() => {
                        textarea1.value = "";
                    },10000)
                }
            }
        })
        document.addEventListener("input",() => {
            localStorage.setItem("TerminalData",textarea1.value);
        })
    </script>
</body>
</html>
