<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ghvswebtpc</title>
    <link rel="icon" href="../SystemLogo.png">
    <style>
        body{
            background: linear-gradient(150deg,rgb(183, 0, 255),rgb(212, 148, 255),rgb(212, 148, 255));
            background-attachment: fixed;
            -moz-user-select: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #div_id1{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 50%;
            height: 50%;
            background-color: rgb(255, 255, 255);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            overflow: hidden;
        }
        #div_id2{
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 25%;
            height: 0.1%;
            background-color: rgb(0, 0, 0);
            animation: divani1 .5s infinite alternate;
            color: rgb(255,255,255)
        }
        @keyframes divani1{
            from {
                transform: translate(0%);
            }   
            to {
                transform: translate(-80%,50%);
            }
        }
        #text1{
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-size: 20px;
            font-weight: 200;
        }
        #text2{
            position: fixed;
            top: 18%;
            left: 20%;
            transform: translate(-50%,-50%);
            font-size: 25px;
            background: linear-gradient(90deg,rgb(255, 0, 255),rgb(174, 0, 255));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        #text3{
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 200;
            white-space: nowrap;
        }
        #image1{
            position: fixed;
            top: 15%;
            left: 5%;
            height: 15%;
        }
        #btn1{
            position: fixed;
            top: 85%;
            left: 50%;
            width: 20%;
            height: 10%;
            transform: translateX(-50%);
            border: none;
            border-radius: 10px;
            color: rgb(255, 255, 255);
            background-color: rgb(193, 0, 255);
            transition: background-color 0.5s ease;
        }
        #btn1:hover{
            background-color: rgb(142,0,207)
        }
    </style>
    <script>
        document.addEventListener("contextmenu",function(NoCtm){
            NoCtm.preventDefault()
        })
        setTimeout(() => {
            location.href="Install6.html"
        },10000)
    </script>
</head>
<body>
    <div id="div_id1">
        <h1 id="text1">安装Ghvswebtpc</h1>
        <img src="../SystemLogo.png" alt="系统图标" id="image1">
        <p id="text2">Ghvswebtpc</p>
        <h2 id="text3">正在安装Ghvswebtpc，请稍等...</h2>
        <button id="btn1" onclick="window.location.href='./Install4.html'">返回</button>
        <div id="div_id2"></div>
    </div>
</body>
</html>
