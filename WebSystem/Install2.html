<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ghvswebtpc</title>
    <link rel="icon" href="../SystemLogo.png">
    <style>
        body{
            background: linear-gradient(150deg,rgb(183, 0, 255),rgb(212, 148, 255),rgb(212, 148, 255));
            background-attachment: fixed;
            -moz-user-select: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #div_id1{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 50%;
            height: 50%;
            background-color: rgb(255, 255, 255);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            overflow: hidden;
        }
        #text1{
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-size: 20px;
            font-weight: 200;
        }
        #text2{
            position: fixed;
            top: 18%;
            left: 20%;
            transform: translate(-50%,-50%);
            font-size: 25px;
            background: linear-gradient(90deg,rgb(255, 0, 255),rgb(174, 0, 255));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        #text3{
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 200;
        }
        #image1{
            position: fixed;
            top: 15%;
            left: 5%;
            height: 15%;
        }
        #btn1{
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40%;
            height: 10%;
            transform: translateX(-50%);
            border: none;
            border-radius: 10px;
            background-color: rgb(230, 230, 230);
            color: rgb(0, 0, 0);
            transition: background-color 0.5s ease,
            color 0.5s ease;
        }
        #btn1:hover{
            background-color: rgb(217, 122, 255);
            color: white;
        }
        #btn2{
            position: fixed;
            top: 85%;
            left: 35%;
            width: 20%;
            height: 10%;
            transform: translateX(-50%);
            border: none;
            border-radius: 10px;
            background-color: rgb(193, 100, 255);
            color: rgb(255, 255, 255);
            transition: background-color 0.5s ease;
        }
        #btn2:hover{
            background-color: rgb(142, 0, 207);
        }
        #btn3{
            position: fixed;
            top: 85%;
            left: 65%;
            width: 20%;
            height: 10%;
            transform: translateX(-50%);
            border: none;
            border-radius: 10px;
            color: rgb(0, 0, 0);
            transition: background-color 0.5s ease,
            color 0.5s ease;
        }
    </style>
    <script>
        document.addEventListener("contextmenu",function(NoCtm){
            NoCtm.preventDefault()
        })
        function btn1_z() {
            let btn1 = document.getElementById("btn1");
            btn1.style.backgroundColor = "rgb(150,0,255)";
            btn1.style.color = "white";
            let btn3 = document.getElementById("btn3");
            btn3.style.backgroundColor = "rgb(230,230,230)"
            if (btn1.style.backgroundColor = "rgb(150,0,255)") {
                btn3.style.backgroundColor = "rgb(142,0,207)";
                btn3.style.color = "white";
            }
        }
    </script>
</head>
<body>
    <div id="div_id1">
        <h1 id="text1">安装Ghvswebtpc</h1>
        <img src="../SystemLogo.png" alt="系统图标" id="image1">
        <p id="text2">Ghvswebtpc</p>
        <h2 id="text3">选择地区</h2>
        <button id="btn1" onclick="btn1_z();">中华人民共和国</button>
        <button id="btn2" onclick="window.location.href='./Install1.html'">返回</button>
        <button id="btn3" onclick="window.location.href='./Install3.html'">下一步</button>
    </div>
</body>
</html>
