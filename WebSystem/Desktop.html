<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ghvswebtpc</title>
    <link rel="icon" href="../SystemLogo.png">
    <style>
        body{
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
            margin: 0;
            -moz-user-select: none;
            -webkit-user-select: none;
            user-select: none;
            padding: 0;
            width: 100%;
            overflow: hidden;
        }
        #div_id1{
            position: fixed;
            left: 50%;
            top: 96%;
            transform: translate(-50%,-50%);
            background-color: rgb(255,255,255);
            border-radius: 10px;
            width: 90%;
            height: 5%;
        }
        .div_class1{
            position: fixed;
            top: 50%;
            transform: translate(-50%,-50%);
            background-color: white;
            width: 8%;
            height: 80%;
            border-radius: 10px;
            transition: background-color 0.5s ease;
        }
        .div_class1:hover{
            background-color: rgb(218, 218, 218);
        }
        #div_id2{
            left: 27%;
        }
        #div_id3{
            left: 36%;
        }
        #text1{
            position: fixed;
            top: 0%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-weight: 200;
            background: linear-gradient(90deg,
            rgb(209, 152, 255),rgb(153, 0, 255),
            rgb(234, 202, 255),rgb(140, 0, 255));
            font-size: 25px;
            background-size: 200% 100%;
            background-position: 0% 50%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: background-position 0.8s ease,
            transform 0.5s ease;
        }
        #text1:hover{
            background-position: 100% 50%;
            transform: translate(-50%,-50%) scale(1.3);
        }
        #text2{
            position: fixed;
            top: -10%;
            left: 15%;
            transform: translate(-50%,-50%);
        }
        #text3{
            position: fixed;
            top: 30%;
            left: 15%;
            font-size: 20px;
            transform: translate(-50%,-50%);
        }
        #image1{
            position: fixed;
            top: 50%;
            left: 5%;
            transform: translate(-50%,-50%);
            height: 90%;
        }
        .image2{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            height: 150%;
        }
        .iframe1{
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 100%;
            height: 90%;
            border: none;
        }
        #window1{
            visibility: hidden;
            opacity: 0;
        }
        #window1.Gxhshow{
            visibility: visible;
            opacity: 1;
        }
        #window2{
            visibility: hidden;
            opacity: 0;
        }
        #window2.Browsershow{
            visibility: visible;
            opacity: 1;
        }
        .window{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background-color: rgb(255, 255, 255);
            width: 500px;
            height: 300px;
            border-radius: 10px;
            overflow: hidden;
            box-sizing: border-box;
            box-shadow: 0 0 0px rgb(0,0,0);
            transition: visibility 0.3s ease,
            opacity 0.3s ease,
            width 0.5s ease,
            height 0.5s ease,
            box-shadow 0.5s ease;
        }
        .window_close{
            position: fixed;
            top: 5%;
            left: 4.9%;
            transform: translate(-50%,-50%);
            background-color: white;
            width: 10%;
            height: 10%;
            transition: background-color 0.5s ease,
            color 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: 200;
        }
        .window_close:hover{
            background-color: rgb(153, 0, 255);
            color: white;
        }
        .window_max{
            position: fixed;
            top: 5%;
            left: 14.9%;
            transform: translate(-50%,-50%);
            background-color: white;
            width: 10%;
            height: 10%;
            transition: background-color 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: 200;
        }
        .window_max:hover{
            background-color: rgb(226, 226, 226);
        }
    </style>
    <script>
        document.addEventListener("contextmenu",function(NoCtm){
            NoCtm.preventDefault()
        })
    </script>
</head>
<body>
    <div id="div_id1">
        <img id="image1" src="../SystemLogo.png" alt="系统图标">
        <div class="div_class1" onclick="GxhShow()" id="div_id2">
            <img class="image2" src="../GxhImage.png" alt="个性化">
        </div>
        <div class="div_class1" id="div_id3" onclick="BrowserShow()">
            <img class="image2" src="../BrowserImage.png" alt="Ghtpcbrowser">
        </div>
        <p id="text1">Hello</p>
        <p id="text2"></p>
        <p id="text3"></p>
    </div>
    <div class="window" id="window1">
        <div class="window_close" onclick="NoShowGxh()">
            <p>×</p>
        </div>
        <div class="window_max" onclick="windowMax1()">
            <p>↔</p>
        </div>
        <iframe src="./Gxh.html" class="iframe1" sandbox="allow-scripts 
        allow-top-navigation-by-user-activation allow-same-origin"></iframe>
    </div>
    <div class="window" id="window2">
        <div class="window_close" onclick="NoShowBrowser()">
            <p>×</p>
        </div>
        <div class="window_max" onclick="windowMax2()">
            <p>↔</p>
        </div>
        <iframe src="./Browser.html" class="iframe1" sandbox="allow-scripts 
        allow-top-navigation-by-user-activation allow-same-origin"></iframe>
    </div>
    <script>
        const pad = n => n < 10 ? "0" + n : n
        function updateTime() {
            const date = new Date();
            const year = date.getFullYear();
            const month = pad(date.getMonth() + 1);
            const day = pad(date.getDate());
            const hour = pad(date.getHours());
            const minute = pad(date.getMinutes());
            const second = pad(date.getSeconds());
            const timeText_text2 = `${year}/${month}/${day}`;
            const timeText_text3 = `${hour}:${minute}:${second}`;
            document.getElementById("text2").innerText = timeText_text2;
            document.getElementById("text3").innerText = timeText_text3;
        }
        let maxZIndex = 1;
        updateTime();
        setInterval(updateTime,1000);
        function GxhShow() {
            maxZIndex++;
            let window1 = document.getElementById("window1");
            window1.style.zIndex = maxZIndex;
            window1.style.boxShadow = "0 0 10px rgb(0,0,0)"
            window1.classList.add("Gxhshow");
            setTimeout(() => {
                window1.style.boxShadow = "0 0 0px rgb(0,0,0)";
            },1000)
        }
        function NoShowGxh() {
            let window1 = document.getElementById("window1");
            window1.classList.remove("Gxhshow");
        }
        function BrowserShow() {
            maxZIndex++;
            let window2 = document.getElementById("window2");
            window2.style.zIndex = maxZIndex;
            window2.style.boxShadow = "0 0 10px rgb(0,0,0)"
            window2.classList.add("Browsershow");
            setTimeout(() => {
                window2.style.boxShadow = "0 0 0px rgb(0,0,0)";
            },1000)
        }
        function NoShowBrowser() {
            let window2 = document.getElementById("window2");
            window2.classList.remove("Browsershow");
        }
        function windowMax1() {
            let window1 = document.getElementById("window1");
            if (window1.style.width === "500px" && window1.style.height === "300px") {
                window1.style.width = "100vw";
                window1.style.height = "100vh";
            }
            else {
                window1.style.width = "500px";
                window1.style.height = "300px";
            }
        }
        function windowMax2() {
            let window2 = document.getElementById("window2");
            if (window2.style.width === "500px" && window2.style.height === "300px") {
                window2.style.width = "100vw";
                window2.style.height = "100vh";
            }
            else {
                window2.style.width = "500px";
                window2.style.height = "300px";
            }
        }
        function QHImage() {
            let body = document.body;
            let GBgGetItem = localStorage.getItem("GBg") || "";
            if (GBgGetItem === "black") {
                body.style.backgroundImage = 'url(../BackgroundBlackImage.PNG)';
            }
            else if (GBgGetItem === "default") {
                localStorage.removeItem("GCsColor");
                body.style.backgroundImage = 'url(../BackGroundImage.png)';
            }
            else {
                body.style.backgroundImage = 'url(../BackGroundImage.png)';
                localStorage.setItem("GBImage", "default");
            }
        }
        QHImage();
    </script>
</body>
</html>
