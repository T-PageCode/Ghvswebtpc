<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ghvswebtpc</title>
    <link rel="icon" href="../SystemLogo.png">
    <style>
        body{
            background-image: url(../BackGroundImage.png);
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
            margin: 0;
            -moz-user-select: none;
            -webkit-user-select: none;
            user-select: none;
            padding: 0;
            width: 100%;
            overflow: hidden;
        }
        #div_id1{
            position: fixed;
            top: 97%;
            left: 50%;
            transform: translate(-50%,-50%);
            background-color: white;
            border-radius: 10px;
            width: 90%;
            height: 5%;
        }
        #div_id3{
            position: fixed;
            top: 50%;
            left: 27%;
            transform: translate(-50%,-50%);
            background-color: white;
            width: 8%;
            height: 80%;
            border-radius: 10px;
            transition: background-color 0.5s ease;
        }
        #div_id3:hover{
            background-color: rgb(218, 218, 218);
        }
        #text1{
            position: fixed;
            top: 0%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-weight: 200;
            background: linear-gradient(90deg,
            rgb(209, 152, 255),rgb(153, 0, 255),
            rgb(234, 202, 255),rgb(140, 0, 255));
            font-size: 25px;
            background-size: 200% 100%;
            background-position: 0% 50%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: background-position 0.8s ease,
            transform 0.5s ease;
        }
        #text1:hover{
            background-position: 100% 50%;
            transform: translate(-50%,-50%) scale(1.3);
        }
        #text2{
            position: fixed;
            top: -10%;
            left: 15%;
            transform: translate(-50%,-50%);
        }
        #text3{
            position: fixed;
            top: 30%;
            left: 15%;
            font-size: 20px;
            transform: translate(-50%,-50%);
        }
        #image1{
            position: fixed;
            top: 50%;
            left: 5%;
            transform: translate(-50%,-50%);
            height: 90%;
        }
        #image2{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            height: 150%;
        }
        #iframe1{
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 100%;
            height: 90%;
            border: none;
        }
        #window1{
            visibility: hidden;
            opacity: 0;
        }
        #window1.show{
            visibility: visible;
            opacity: 1;
        }
        .window{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background-color: rgb(255, 255, 255);
            width: 500px;
            height: 300px;
            border-radius: 10px;
            overflow: hidden;
            box-sizing: border-box;
            transition: visibility 0.3s ease,
            opacity 0.3s ease;
        }
        .window_close{
            position: fixed;
            top: 5%;
            left: 5%;
            transform: translate(-50%,-50%);
            background-color: white;
            width: 10%;
            height: 10%;
            transition: background-color 0.5s ease,
            text 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: 200;
        }
        .window_close:hover{
            background-color: rgb(153, 0, 255);
            color: white;
        }
    </style>
    <script>
        document.addEventListener("contextmenu",function(NoCtm){
            NoCtm.preventDefault()
        })
    </script>
</head>
<body>
    <div id="div_id1">
        <img id="image1" src="../SystemLogo.png" alt="系统图标" onclick="">
        <div id="div_id3" onclick="GxhShow()">
            <img id="image2" src="../GxhImage.png" alt="个性化">
        </div>
        <p id="text1">Hello</p>
        <p id="text2"></p>
        <p id="text3"></p>
    </div>
    <div class="window" id="window1">
        <div class="window_close" onclick="NoShowGxh()">
            <p>×</p>
        </div>
        <iframe src="./Gxh.html" id="iframe1" sandbox="allow-scripts 
        allow-top-navigation-by-user-activation allow-same-origin"></iframe>
    </div>
    <script>
        const pad = n => n < 10 ? "0" + n : n
        function updateTime() {
            const date = new Date();
            const year = date.getFullYear();
            const month = pad(date.getMonth() + 1);
            const day = pad(date.getDate());
            const hour = pad(date.getHours());
            const minute = pad(date.getMinutes());
            const second = pad(date.getSeconds());
            const timeText_text2 = `${year}/${month}/${day}`;
            const timeText_text3 = `${hour}:${minute}:${second}`;
            document.getElementById("text2").innerText = timeText_text2;
            document.getElementById("text3").innerText = timeText_text3;
        }
        updateTime();
        setInterval(updateTime,1000);
        function GxhShow() {
            document.getElementById("window1").classList.add("show")
        }
        function NoShowGxh() {
            document.getElementById("window1").classList.remove("show")
        }
        function pageload() {
            localStorage.setItem("LoadTag","1");
            location.reload();
        }
        function QHImage() {
            let body = document.body;
            let GBimageGetItem = localStorage.getItem("GBImage") || "";
            let GCsGetItem = localStorage.getItem("GCsColor") || "";
            let RT = localStorage.getItem("LoadTag")
            if (GCsGetItem === "black") {
                localStorage.setItem("GBImage","");
            }
            if (GBimageGetItem === "default") {
                localStorage.setItem("GCsColor","");
            }
            if (GBimageGetItem === "default") {
                body.style.backgroundImage = "url(../BackGroundImage.png)";
            }
            else if (GCsGetItem === "black") {
                body.style.backgroundImage = "url(../BackGroundBlackImage.png)";
            }
        }
        QHImage();
    </script>
</body>
</html>
