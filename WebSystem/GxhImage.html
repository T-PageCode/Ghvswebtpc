<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ghvswebtpc</title>
    <link rel="icon" href="../SystemLogo.png">
    <style>
        body{
            background-color: white;
            -moz-user-select: none;
            -webkit-user-select: none;

        #text1{
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: black;

        }
        #text2{
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: black;
            font-size: 20px;
            font-weight: 200;
        }
        #btn1{
            position: fixed;
            top: 90%;
            left: 50%;

            height: 10%;

        document.addEventListener("contextmenu",function(NoCtm){

        })
