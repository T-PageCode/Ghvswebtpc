<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="SystemLogo.png">
    <title>Ghvswebtpc介绍</title>
    <style>
        body{
            background-image: url("BackGroundImage.png");
            background-repeat: no-repeat;
            background-size: cover;
            margin: 0;
            height: 100vh;
            background-attachment: fixed;
            user-select: none;
            -moz-user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        #div_id1{
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255,255,255,0.3);
            width: 50%;
            height: 60%;
            border-radius: 10px;
            -webkit-backdrop-filter: blur(9px);
            backdrop-filter: blur(9px);
        }
        #text1{
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 200;
            font-size: 50px;
            background: linear-gradient(90deg,rgb(255, 255, 255),rgb(253, 192, 255),rgb(212, 0, 255));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        #text2{
            position: fixed;
            top: -2.5%;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 200;
            font-size: 50px;
            color: white;
            white-space: nowrap;
        }
        #text3{
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 23px;
            font-weight: 200;
            width: 320px;
            word-break: break-all;
            line-height: 1.5;
        }
        #ul1{
            position: fixed;
            top: 27%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 23px;
            font-weight: 200;
            width: 320px;
            word-break: break-all;
            line-height: 1.5;
        }
        #btn1{
            position: fixed;
            top: 90%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 25%;
            height: 8%;
            color: white;
            border: none;
            border-radius: 10px;
            background-color:rgb(149, 0, 179);
            transition: background-color 0.5s ease;
            font-size: 15px;
        }
        #btn1:hover{
            background-color:rgb(212, 0, 255);
        }
    </style>
    <script>
        document.addEventListener("contextmenu",function(No_BrYM) {
            No_BrYM.preventDefault()
        })
    </script>
</head>
<body>
    <h1 id="text1">Ghvswebtpc</h1>
    <div id="div_id1">
        <h1 id="text2">替代Cwtpc</h1>
        <p id="text3">
            Cwtpc已于2026/5/20停止支持<br>
            Ghvswebtpc相比Cwtpc做了很大的改变:<br>
        </p>
        <ul id="ul1">
            <li>增加了安装界面</li>
            <li>可以设置用户名和密码</li>
            <li>登录界面增加了完整的判断逻辑</li>
            <li>UI升级,增加纯净模式</li>
        </ul>
        <button id="btn1" onclick="window.location.href='JieShao1.html'">上一页</button>
    </div>
</body>
</html>
